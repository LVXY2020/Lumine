<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国道512线 TJ-03标段 - 施工数据云管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        /* Tab 标签页样式 */
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #7f8c8d; }
        .tab-btn.active { color: #2980b9; border-bottom: 3px solid #2980b9; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 表单样式 */
        .form-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: #e8f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d4e6f1; }
        .form-item { flex: 1; min-width: 150px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #2c3e50; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        /* 特殊按钮颜色 */
        .btn-export { background-color: #27ae60; float: right; margin-left: 10px; margin-bottom: 10px; }
        .btn-export:hover { background-color: #219653; }
        .btn-danger { background-color: #e74c3c; float: left; margin-bottom: 10px;}
        .btn-danger:hover { background-color: #c0392b; }
        .btn-cloud { background-color: #8e44ad; float: left; margin-left: 10px; margin-bottom: 10px;}
        .btn-cloud:hover { background-color: #732d91; }
        .clearfix::after { content: ""; clear: both; display: table; }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f8ff; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
        
        .table-container { max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>国道512线 TJ-03标段 - 施工数据云管理系统</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('entryTab', this)">📝 每日填报流水</button>
        <button class="tab-btn" onclick="switchTab('summaryTab', this)">📊 全线进度汇总台账</button>
    </div>

    <div id="entryTab" class="tab-content active">
        <div class="form-group" id="entryForm">
            <div class="form-item"><label>施工日期</label><input type="date" id="dateInput" required></div>
            <div class="form-item"><label>起讫桩号</label><input type="text" id="startStation" placeholder="如: K29+050~K29+150" required></div>
            <div class="form-item">
                <label>工程大类</label>
                <select id="categorySelect" onchange="updateItems()">
                    <option value="">-- 请选择大类 --</option>
                </select>
            </div>
            <div class="form-item">
                <label>细分工序</label>
                <select id="itemSelect" onchange="updateUnit()" required>
                    <option value="">-- 请先选择大类 --</option>
                </select>
            </div>
            <div class="form-item">
                <label>今日完成量 (<span id="unitDisplay" class="text-red">单位</span>)</label>
                <input type="number" id="qtyInput" step="0.01" placeholder="填入数字" required>
            </div>
            <div class="form-item" style="justify-content: flex-end;">
                <button onclick="addData()">+ 录入并保存到本地</button>
            </div>
        </div>

        <div class="clearfix">
            <button class="btn-danger" onclick="clearData()">⚠️ 清空本地数据</button>
            <button id="cloudBtn" class="btn-cloud" onclick="saveToCloud()">☁️ 备份数据至互联网 (GitHub)</button>
            <button class="btn-export" onclick="exportExcel('dataTable', '施工流水报表')">⬇️ 导出流水 Excel</button>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr><th>序号</th><th>日期</th><th>起讫桩号</th><th>工程大类</th><th>细分工序</th><th>完成数量</th><th>单位</th><th>录入时间</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="summaryTab" class="tab-content">
        <div class="clearfix">
            <button class="btn-export" onclick="exportExcel('summaryTable', '工程量汇总台账')">⬇️ 导出台账 Excel</button>
        </div>
        <div class="table-container">
            <table id="summaryTable">
                <thead>
                    <tr><th>工程大类</th><th>细分工序</th><th>单位</th><th>图纸设计总量</th><th>累计已完成</th><th>剩余工程量</th><th>进度 %</th></tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ================= GitHub 云端配置区 =================
    // 请在此处修改为您自己的 GitHub 账号和仓库名
    const GITHUB_USER = "LVXY2020"; 
    const GITHUB_REPO = "Lumine"; 
    const FILE_PATH = "tj03_data.json"; 
    // =====================================================

        ],
        "3. 路面及加宽工程": [

            { name: "AC-16C型改性沥青上面层 (4cm/5cm)", unit: "1000m²", total: 141.887 },

            { name: "(4:96)水泥稳定碎石底基层 (20cm)", unit: "1000m²", total: 107.421 },
            { name: "4%及5%水泥稳定碎石底基层/调平层", unit: "1000m²", total: 8.400 },
            { name: "I / II / III型路肩板预制安装", unit: "m³", total: 2408 },

        ],
        "4. 排水及附属工程": [

            { name: "C30预制钢筋砼盖板", unit: "m³", total: 305.3 },
            { name: "未筛分碎石垫层", unit: "m³", total: 344 },
            { name: "C25现浇砼", unit: "m³", total: 1343.3 },

            { name: "C25混凝土拦水带", unit: "m³", total: null },
            { name: "占地", unit: "亩", total: 0.06 }
        ],
        "5. 拆除工程": [
            { name: "拆除旧桥涵钢筋砼 / 混凝土", unit: "m³", total: 3194 },
            { name: "拆除旧桥涵浆砌片石", unit: "m³", total: 235 },
            { name: "拆除石砌护坡", unit: "m³", total: 240 },
            { name: "拆除圆管涵管节 (各管径合计)", unit: "m", total: 225.5 }
        ],
        "6. 桥梁工程": [
            { name: "钻孔灌注桩成孔 (按地质/管径)", unit: "m", total: 2532 },
            { name: "C30水下混凝土 (桩基)", unit: "m³", total: 2710 },
            { name: "C30混凝土 (承台/台帽/墩柱)", unit: "m³", total: 332 },
            { name: "C40混凝土 (支座垫石/挡块/护栏)", unit: "m³", total: 1223 },
            { name: "C50预制及现浇混凝土 (箱梁)", unit: "m³", total: 2676 },
            { name: "C50钢纤维混凝土", unit: "m³", total: 18 },
            { name: "HRB400钢筋 (桥梁各部位合计)", unit: "kg", total: 1128866 },
            { name: "HPB300钢筋 (桥梁各部位合计)", unit: "kg", total: 49326 },
            { name: "钢绞线", unit: "kg", total: 95151 },
            { name: "金属波纹管 (d=55mm)", unit: "m", total: 18820 },
            { name: "锚具 (M15-4 / M15-5)", unit: "套", total: 1626 },
            { name: "桥梁支座 (GPZ系列各型号)", unit: "套", total: 69 },
            { name: "桥面伸缩缝 (160型/80型)", unit: "m", total: 60 },
            { name: "桥面防水层", unit: "m²", total: 5357 },
            { name: "桥面沥青混凝土", unit: "m³", total: 482 },
            { name: "声测管 (各管径合计)", unit: "kg", total: 25409 },
            { name: "泄水管及配件 (含铸铁/PVC/管件)", unit: "套/m/kg", total: null },
            { name: "锥坡开挖 / 桥台挖方", unit: "m³", total: 1215 },
            { name: "锥坡C25砼护坡及基础", unit: "m³", total: 966 },
            { name: "锥坡未筛分碎石 (垫层/填筑)", unit: "m³", total: 2466 },
            { name: "聚丙烯纤维 / 玻纤格栅", unit: "kg", total: 493 },
            { name: "橡胶垫块 / 油毛毡 / 土工布", unit: "dm³/m²/m²", total: null }
        ],
        "7. 涵洞工程": [
            { name: "涵洞干挖 / 清理土方", unit: "m³", total: 268.8 },
            { name: "基底换填未筛分碎石", unit: "m³", total: 51 },
            { name: "未筛分碎石垫层", unit: "m³", total: 17.5 },
            { name: "C30混凝土 (涵身/基础/铺砌)", unit: "m³", total: 107.7 },
            { name: "C40混凝土 (现浇明板)", unit: "m³", total: 10.1 },
            { name: "涵洞受力钢筋 (HRB400等合计)", unit: "kg", total: 4922 },
            { name: "1cm厚橡胶垫", unit: "m²", total: 9.1 },
            { name: "支座锚栓 (Φ25)", unit: "kg", total: null }
        ]
    };

    // 2. 本地数据初始化 (从 localStorage 读取)
    let dataList = JSON.parse(localStorage.getItem('tj03_data')) || [];
    let recordId = dataList.length > 0 ? Math.max(...dataList.map(d => d.id)) + 1 : 1;

    // 页面加载初始化
    window.onload = function() {
        document.getElementById('dateInput').valueAsDate = new Date();
        initCategorySelect();
        renderTable();
        renderSummary();
    };

    // 3. Tab 切换
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'summaryTab') renderSummary(); 
    }

    // 4. 级联菜单
    function initCategorySelect() {
        const catSelect = document.getElementById("categorySelect");
        for(let key in projectDict) {
            let opt = document.createElement("option");
            opt.value = key; opt.textContent = key;
            catSelect.appendChild(opt);
        }
    }

    function updateItems() {
        const category = document.getElementById("categorySelect").value;
        const itemSelect = document.getElementById("itemSelect");
        itemSelect.innerHTML = '<option value="">-- 请选择工序 --</option>';
        if (category && projectDict[category]) {
            projectDict[category].forEach(item => {
                let opt = document.createElement("option");
                opt.value = item.name; opt.textContent = item.name;
                opt.setAttribute("data-unit", item.unit);
                itemSelect.appendChild(opt);
            });
        }
        document.getElementById("unitDisplay").textContent = "单位";
    }

    function updateUnit() {
        const itemSelect = document.getElementById("itemSelect");
        const selectedOpt = itemSelect.options[itemSelect.selectedIndex];
        document.getElementById("unitDisplay").textContent = selectedOpt ? selectedOpt.getAttribute("data-unit") : "单位";
    }

    // 5. 增删本地数据 (含密码锁定清除)
    function addData() {
        const date = document.getElementById("dateInput").value;
        const station = document.getElementById("startStation").value;
        const category = document.getElementById("categorySelect").value;
        const itemSelect = document.getElementById("itemSelect");
        const item = itemSelect.value;
        const qty = parseFloat(document.getElementById("qtyInput").value);
        const unit = itemSelect.options[itemSelect.selectedIndex]?.getAttribute("data-unit");

        if (!date || !station || !category || !item || isNaN(qty)) {
            alert("请完整正确填写施工数据！"); return;
        }

        dataList.push({ id: recordId++, date, station, category, item, qty: qty, unit, timestamp: new Date().toLocaleTimeString() });
        localStorage.setItem('tj03_data', JSON.stringify(dataList));
        
        document.getElementById("qtyInput").value = ""; 
        renderTable();
        renderSummary(); 
    }

    function clearData() {
        const pwd = prompt("⚠️ 危险操作：清空本地数据需要管理员权限。\n请输入清除密码：");
        if (pwd === "888888") { 
            localStorage.removeItem('tj03_data');
            dataList = [];
            recordId = 1;
            renderTable();
            renderSummary();
            alert("✅ 数据已成功清空！");
        } else if (pwd !== null) {
            alert("❌ 密码错误，您没有权限清空数据！");
        }
    }

    // 6. 渲染表格视图
    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = ""; 
        [...dataList].reverse().forEach(row => {
            tbody.innerHTML += `<tr><td>${row.id}</td><td>${row.date}</td><td>${row.station}</td><td>${row.category}</td><td>${row.item}</td><td class="text-green">${row.qty.toFixed(2)}</td><td>${row.unit}</td><td>${row.timestamp}</td></tr>`;
        });
    }

    function renderSummary() {
        const tbody = document.getElementById("summaryBody");
        tbody.innerHTML = "";
        
        for (let category in projectDict) {
            projectDict[category].forEach(dictItem => {
                let completedSum = dataList
                    .filter(data => data.item === dictItem.name)
                    .reduce((sum, data) => sum + parseFloat(data.qty), 0);
                
                let totalStr = dictItem.total !== null ? dictItem.total : "待定";
                let remainStr = dictItem.total !== null ? (dictItem.total - completedSum).toFixed(2) : "-";
                let percentStr = dictItem.total !== null && dictItem.total > 0 ? ((completedSum / dictItem.total) * 100).toFixed(1) + "%" : "-";
                let remainClass = dictItem.total !== null && (dictItem.total - completedSum) < 0 ? "text-red" : "";

                tbody.innerHTML += `
                    <tr>
                        <td>${category}</td>
                        <td style="text-align:left;">${dictItem.name}</td>
                        <td>${dictItem.unit}</td>
                        <td style="font-weight:bold;">${totalStr}</td>
                        <td class="text-green">${completedSum.toFixed(2)}</td>
                        <td class="${remainClass}">${remainStr}</td>
                        <td>${percentStr}</td>
                    </tr>
                `;
            });
        }
    }

    // 7. 导出 Excel
    function exportExcel(tableId, fileNameBase) {
        let tableElement = document.getElementById(tableId);
        let workbook = XLSX.utils.table_to_book(tableElement, {sheet: "Data"});
        let today = new Date().toISOString().split('T')[0];
        XLSX.writeFile(workbook, `G512_TJ03_${fileNameBase}_${today}.xlsx`);
    }

    // 8. GitHub 云端同步模块
    // 优化后的云端同步函数：增加“记住我”逻辑
    async function saveToCloud() {
        if (dataList.length === 0) {
            alert("没有数据可以上传！"); return;
        }

        // 1. 先尝试从本地缓存读取 Token
        let userToken = localStorage.getItem('github_token');

        // 2. 如果本地没存过，或者 Token 失效了，再弹窗问
        if (!userToken) {
            userToken = prompt("☁️ 首次同步需验证身份。\n请输入您的 GitHub Token (ghp_开头的长字符串)：");
            if (!userToken) return;
            
            // 询问是否需要记住，方便下次使用
            if (confirm("是否在本地记住此通行证？\n(记住后，下次备份将不再询问)")) {
                localStorage.setItem('github_token', userToken);
            }
        }

        const button = document.getElementById('cloudBtn');
        const originalText = button.innerText;
        button.innerText = "⏳ 正在同步...";
        button.disabled = true;

        const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataList, null, 2))));

        try {
            let sha = "";
            const getRes = await fetch(apiUrl, {
                headers: { "Authorization": `token ${userToken}` }
            });

            // 如果返回 401，说明存的 Token 错了或过期了
            if (getRes.status === 401) {
                localStorage.removeItem('github_token'); // 清除错误的 Token
                alert("❌ 通行证无效或已过期，请重新点击备份并输入正确的 Token。");
                return;
            }

            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha; 
            }

            const bodyData = {
                message: `施工数据同步 - ${new Date().toLocaleString()}`,
                content: content
            };
            if (sha) bodyData.sha = sha; 

            const putRes = await fetch(apiUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${userToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bodyData)
            });

            if (putRes.ok) {
                alert("✅ 云端同步成功！");
            } else {
                throw new Error("推送失败");
            }
        } catch (error) {
            alert("❌ 同步失败，请检查网络。");
            console.error(error);
        } finally {
            button.innerText = originalText;
            button.disabled = false;
        }
    }
</script>

</body>
</html>
