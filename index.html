<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国道512线 TJ-03标段 - 施工数据全联动系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #7f8c8d; }
        .tab-btn.active { color: #2980b9; border-bottom: 3px solid #2980b9; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: #e8f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d4e6f1; }
        .form-item { flex: 1; min-width: 150px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #2c3e50; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* 核心按钮样式 */
        .btn-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 18px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; color: white; }
        .btn-add { background-color: #3498db; }
        .btn-sync { background-color: #8e44ad; } /* 紫色：云端同步 */
        .btn-pull { background-color: #f39c12; } /* 橙色：拉取数据 */
        .btn-export { background-color: #27ae60; } /* 绿色：导出 */
        .btn-danger { background-color: #e74c3c; } /* 红色：清空并删库 */
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
        .table-container { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>国道512线 TJ-03标段 - 施工数据全联动系统</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('entryTab', this)">📝 每日填报</button>
        <button class="tab-btn" onclick="switchTab('summaryTab', this)">📊 汇总台账</button>
    </div>

    <div id="entryTab" class="tab-content active">
        <div class="form-group">
            <div class="form-item"><label>日期</label><input type="date" id="dateInput"></div>
            <div class="form-item"><label>起讫桩号</label><input type="text" id="startStation" placeholder="如 K29+050"></div>
            <div class="form-item"><label>大类</label><select id="categorySelect" onchange="updateItems()"></select></div>
            <div class="form-item"><label>细分工序</label><select id="itemSelect" onchange="updateUnit()"></select></div>
            <div class="form-item"><label>完成量 (<span id="unitDisplay" class="text-red">单位</span>)</label><input type="number" id="qtyInput"></div>
            <div class="form-item" style="justify-content: flex-end; flex: 0.5;">
                <button class="btn-add" onclick="addData()">+ 录入</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-danger" onclick="clearData()">⚠️ 清空本地并同步删库</button>
            <button class="btn-pull" onclick="syncFromCloud()">☁️ 从云端拉取最新</button>
            <button id="syncBtn" class="btn-sync" onclick="syncToCloud()">⬆️ 同步至云端数据库</button>
            <button class="btn-export" onclick="exportExcel('dataTable', '施工流水')">⬇️ 导出 Excel</button>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead><tr><th>序号</th><th>日期</th><th>起讫桩号</th><th>工程大类</th><th>工序</th><th>数量</th><th>单位</th><th>记录时间</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="summaryTab" class="tab-content">
        <div class="table-container">
            <table id="summaryTable">
                <thead><tr><th>大类</th><th>工序</th><th>单位</th><th>图纸总量</th><th>累计已完成</th><th>剩余量</th><th>进度%</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
</div>

            { name: "未筛分碎石垫层", unit: "m³", total: 17.5 },
            { name: "C30混凝土 (涵身/基础/铺砌)", unit: "m³", total: 107.7 },
            { name: "C40混凝土 (现浇明板)", unit: "m³", total: 10.1 },
            { name: "涵洞受力钢筋 (HRB400等合计)", unit: "kg", total: 4922 },

    let dataList = JSON.parse(localStorage.getItem('tj03_data')) || [];

    window.onload = function() {
        initCategorySelect();
        renderTable();
        renderSummary();
    };

    // --- 核心：数据库操作联动 ---

    // 1. 同步到 GitHub (覆盖当前数据库)
    async function syncToCloud() {
        const token = localStorage.getItem('github_token') || prompt("请输入 Token 同步至数据库：");
        if(!token) return;

        const btn = document.getElementById('syncBtn');
        btn.innerText = "⏳ 同步中...";
        btn.disabled = true;

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        // 支持中文的 Base64 转换
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataList, null, 2))));

        try {
            let sha = "";
            const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(getRes.ok) sha = (await getRes.json()).sha;

            const res = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "DB Sync", content: content, sha: sha })
            });

            if(res.ok) {
                localStorage.setItem('github_token', token);
                alert("✅ 数据库已同步更新！");
            } else { alert("同步失败，请检查 Token 权限。"); }
        } catch (e) { alert("网络异常，请稍后重试。"); }
        finally { btn.innerText = "⬆️ 同步至云端数据库"; btn.disabled = false; }
    }

    // 2. 从 GitHub 拉取 (覆盖本地)
    async function syncFromCloud() {
        const token = localStorage.getItem('github_token') || prompt("请输入 Token 拉取数据库：");
        if(!token) return;

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(res.ok) {
                const json = await res.json();
                const cloudData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                if(confirm(`检测到云端有 ${cloudData.length} 条记录，是否覆盖本地？`)) {
                    dataList = cloudData;
                    localStorage.setItem('tj03_data', JSON.stringify(dataList));
                    localStorage.setItem('github_token', token);
                    renderTable(); renderSummary();
                    alert("同步完成！");
                }
            } else { alert("拉取失败或云端尚无数据。"); }
        } catch (e) { alert("网络错误。"); }
    }

    // 3. 清空联动：本地删完后直接建议同步数据库
    async function clearData() {
        if(prompt("输入密码888888执行清库操作") === "888888") {
            dataList = [];
            localStorage.removeItem('tj03_data');
            renderTable(); renderSummary();
            
            if(confirm("本地已清空！是否同步清空 GitHub 数据库？")) {
                syncToCloud();
            }
        }
    }

    // --- 界面基础功能 ---
    function initCategorySelect() {
        const cat = document.getElementById("categorySelect");
        for(let key in projectDict) {
            let opt = document.createElement("option");
            opt.value = key; opt.textContent = key;
            cat.appendChild(opt);
        }
        updateItems();
    }

    function updateItems() {
        const cat = document.getElementById("categorySelect").value;
        const itemS = document.getElementById("itemSelect");
        itemS.innerHTML = "";
        projectDict[cat].forEach(i => {
            let opt = document.createElement("option");
            opt.value = i.name; opt.textContent = i.name;
            opt.setAttribute("data-unit", i.unit);
            itemS.appendChild(opt);
        });
        updateUnit();
    }

    function updateUnit() {
        const i = document.getElementById("itemSelect");
        const u = i.options[i.selectedIndex]?.getAttribute("data-unit");
        document.getElementById("unitDisplay").textContent = u || "单位";
    }

    function addData() {
        const date = document.getElementById("dateInput").value;
        const qty = parseFloat(document.getElementById("qtyInput").value);
        if(!date || isNaN(qty)) { alert("请填写日期和数量"); return; }

        dataList.push({
            date,
            station: document.getElementById("startStation").value,
            category: document.getElementById("categorySelect").value,
            item: document.getElementById("itemSelect").value,
            qty: qty,
            unit: document.getElementById("unitDisplay").textContent,
            time: new Date().toLocaleTimeString()
        });

        localStorage.setItem('tj03_data', JSON.stringify(dataList));
        document.getElementById("qtyInput").value = "";
        renderTable(); renderSummary();
    }

    function renderTable() {
        const b = document.getElementById("tableBody");
        b.innerHTML = "";
        [...dataList].reverse().forEach((r, idx) => {
            b.innerHTML += `<tr><td>${dataList.length - idx}</td><td>${r.date}</td><td>${r.station}</td><td>${r.category}</td><td>${r.item}</td><td class="text-green">${r.qty}</td><td>${r.unit}</td><td>${r.time}</td></tr>`;
        });
    }

    function renderSummary() {
        const b = document.getElementById("summaryBody");
        b.innerHTML = "";
        for(let c in projectDict) {
            projectDict[c].forEach(d => {
                let sum = dataList.filter(x => x.item === d.name).reduce((a, x) => a + x.qty, 0);
                let per = d.total ? (sum/d.total*100).toFixed(1) + "%" : "-";
                let rem = d.total ? (d.total - sum).toFixed(2) : "-";
                b.innerHTML += `<tr><td>${c}</td><td style="text-align:left">${d.name}</td><td>${d.unit}</td><td>${d.total||'-'}</td><td class="text-green">${sum.toFixed(2)}</td><td class="${d.total && (d.total-sum)<0?'text-red':''}">${rem}</td><td>${per}</td></tr>`;
            });
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'summaryTab') renderSummary();
    }

    function exportExcel(id, name) {
        let wb = XLSX.utils.table_to_book(document.getElementById(id));
        XLSX.writeFile(wb, `${name}_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
</script>

</body>
</html>
