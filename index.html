<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国道512线 TJ-03标段 - 施工云管理系统 V1.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #7f8c8d; }
        .tab-btn.active { color: #2980b9; border-bottom: 3px solid #2980b9; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; background: #e8f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d4e6f1; }
        .form-item { flex: 1; min-width: 140px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #2c3e50; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* 自定义输入框样式 */
        .custom-box { background: #fffbe6; border: 1px solid #ffe58f !important; margin-top: 5px; display: none; }

        .btn-group { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;}
        button { padding: 9px 16px; font-size: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; color: white; }
        .btn-add { background-color: #3498db; }
        .btn-upload { background-color: #8e44ad; }
        .btn-export { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; }
        .btn-refresh { background-color: #f39c12; }
        button:hover { opacity: 0.8; }

        .section-title { font-size: 16px; font-weight: bold; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 8px; margin: 20px 0 10px 0; display: flex; justify-content: space-between; align-items: center;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
        .text-blue { color: #2980b9; font-weight: bold; }
        
        .local-table-container { max-height: 200px; overflow-y: auto; border: 1px dashed #bdc3c7; }
        .cloud-table-container { max-height: 400px; overflow-y: auto; border: 1px solid #8e44ad; }
        .status-dot { height: 10px; width: 10px; background-color: #e74c3c; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.online { background-color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h1>国道512线 TJ-03标段 - 施工云管理系统 V1.0</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('entryTab', this)">📝 数据录入中心</button>
        <button class="tab-btn" onclick="switchTab('summaryTab', this)">📊 云端总台账 <span id="cloudStatus" class="status-dot"></span></button>
    </div>

    <div id="entryTab" class="tab-content active">
        <div class="form-group">
            <div class="form-item"><label>日期</label><input type="date" id="dateInput"></div>
            <div class="form-item"><label>填表人</label><input type="text" id="reporterInput" placeholder="请输入姓名"></div>
            <div class="form-item"><label>起讫桩号</label><input type="text" id="startStation" placeholder="如 K29+050"></div>
            
            <div class="form-item">
                <label>工程大类</label>
                <select id="categorySelect" onchange="handleCategoryChange()">
                    <option value="">-- 请选择 --</option>
                </select>
                <input type="text" id="customCategory" class="custom-box" placeholder="输入新大类名称">
            </div>

            <div class="form-item">
                <label>细分工序</label>
                <select id="itemSelect" onchange="handleItemChange()">
                    <option value="">-- 请选择 --</option>
                </select>
                <input type="text" id="customItem" class="custom-box" placeholder="输入新工序名称">
            </div>

            <div class="form-item">
                <label>完成量 (<span id="unitDisplay" class="text-red">单位</span>)</label>
                <input type="number" id="qtyInput" placeholder="数值">
                <input type="text" id="customUnit" class="custom-box" placeholder="输入单位(如:米)">
            </div>

            <div class="form-item" style="flex: 1.5;"><label>备注</label><input type="text" id="remarksInput" placeholder="选填：施工情况说明"></div>
            
            <div class="form-item" style="justify-content: flex-end; flex: 0.5;">
                <button class="btn-add" onclick="addData()">+ 暂存本地</button>
            </div>
        </div>

        <div class="section-title">
            <span>💾 本地待上传流水</span>
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-danger" onclick="clearLocalData()">🗑️ 清空本地</button>
                <button id="uploadBtn" class="btn-upload" onclick="uploadToCloud()">⬆️ 合并上传至云端</button>
            </div>
        </div>
        <div class="local-table-container">
            <table id="localTable">
                <thead><tr><th>日期</th><th>填表人</th><th>桩号</th><th>工序名称</th><th>数量</th><th>单位</th><th>备注</th></tr></thead>
                <tbody id="localBody"></tbody>
            </table>
        </div>

        <div class="section-title" style="margin-top: 30px; border-left-color: #8e44ad;">
            <span>☁️ 云端历史流水 (包含全部填报明细)</span>
            <div class="btn-group" style="margin-bottom: 0;">
                <button class="btn-refresh" onclick="fetchCloudData()">🔄 刷新云端</button>
                <button class="btn-export" onclick="exportExcel('cloudTable', '全线施工云端流水明细')">⬇️ 导出全部云端流水</button>
            </div>
        </div>
        <div class="cloud-table-container">
            <table id="cloudTable">
                <thead><tr><th>批次</th><th>日期</th><th>填表人</th><th>桩号</th><th>大类</th><th>工序</th><th>数量</th><th>单位</th><th>备注</th></tr></thead>
                <tbody id="cloudBody"></tbody>
            </table>
        </div>
    </div>

    <div id="summaryTab" class="tab-content">
        <div class="btn-group" style="justify-content: flex-end;">
            <button class="btn-export" onclick="exportExcel('summaryTable', '云端汇总台账')">⬇️ 导出云端台账 Excel</button>
        </div>
        <div class="table-container">
            <table id="summaryTable">
                <thead><tr><th>大类</th><th>工序</th><th>单位</th><th>设计总量</th><th>已完成(云)</th><th>剩余量</th><th>进度%</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ======= 配置 =======

    const GITHUB_REPO = "Lumine";

            { name: "拆除圆管涵管节 (各管径合计)", unit: "m", total: 225.5 }
        ],
        "6. 桥梁工程": [
            { name: "钻孔灌注桩成孔 (按地质/管径)", unit: "m", total: 2532 },
            { name: "C30水下混凝土 (桩基)", unit: "m³", total: 2710 },

            { name: "HPB300钢筋 (桥梁各部位合计)", unit: "kg", total: 49326 },

            { name: "桥面伸缩缝 (160型/80型)", unit: "m", total: 60 },
            { name: "桥面防水层", unit: "m²", total: 5357 },
            { name: "桥面沥青混凝土", unit: "m³", total: 482 },
            { name: "声测管 (各管径合计)", unit: "kg", total: 25409 },
            { name: "锥坡开挖 / 桥台挖方", unit: "m³", total: 1215 },
            { name: "锥坡C25砼护坡及基础", unit: "m³", total: 966 },
            { name: "锥坡未筛分碎石 (垫层/填筑)", unit: "m³", total: 2466 },
            { name: "聚丙烯纤维 / 玻纤格栅", unit: "kg", total: 493 }
        ],
        "7. 涵洞工程": [
            { name: "涵洞干挖 / 清理土方", unit: "m³", total: 268.8 },
            { name: "基底换填未筛分碎石", unit: "m³", total: 51 },
            { name: "未筛分碎石垫层", unit: "m³", total: 17.5 },
            { name: "C30混凝土 (涵身/基础/铺砌)", unit: "m³", total: 107.7 },
            { name: "C40混凝土 (现浇明板)", unit: "m³", total: 10.1 },
            { name: "涵洞受力钢筋 (HRB400等合计)", unit: "kg", total: 4922 },
            { name: "1cm厚橡胶垫", unit: "m²", total: 9.1 }
        ]
    };

    let localDataList = JSON.parse(localStorage.getItem('tj03_local_v3')) || [];
    let cloudDataList = [];

    window.onload = function() {
        document.getElementById('dateInput').valueAsDate = new Date();
        initCategorySelect();
        renderLocalTable();
        if(localStorage.getItem('github_token')) fetchCloudData(true);
    };

    // --- 自定义输入逻辑 ---
    function initCategorySelect() {
        const cat = document.getElementById("categorySelect");
        cat.innerHTML = '<option value="">-- 请选择 --</option>';
        for(let key in projectDict) {
            let opt = document.createElement("option");
            opt.value = key; opt.textContent = key;
            cat.appendChild(opt);
        }
        let customOpt = document.createElement("option");
        customOpt.value = "CUSTOM"; customOpt.textContent = " [➕ 自定义大类...]";
        cat.appendChild(customOpt);
        updateItems();
    }

    function handleCategoryChange() {
        const cat = document.getElementById("categorySelect").value;
        const customBox = document.getElementById("customCategory");
        customBox.style.display = (cat === "CUSTOM") ? "block" : "none";
        updateItems();
    }

    function updateItems() {
        const cat = document.getElementById("categorySelect").value;
        const itemS = document.getElementById("itemSelect");
        itemS.innerHTML = '<option value="">-- 请选择 --</option>';
        
        if (cat !== "CUSTOM" && projectDict[cat]) {
            projectDict[cat].forEach(i => {
                let opt = document.createElement("option");
                opt.value = i.name; opt.textContent = i.name;
                opt.setAttribute("data-unit", i.unit);
                itemS.appendChild(opt);
            });
        }
        let customOpt = document.createElement("option");
        customOpt.value = "CUSTOM"; customOpt.textContent = " [➕ 自定义工序...]";
        itemS.appendChild(customOpt);
        handleItemChange();
    }

    function handleItemChange() {
        const itemVal = document.getElementById("itemSelect").value;
        document.getElementById("customItem").style.display = (itemVal === "CUSTOM") ? "block" : "none";
        document.getElementById("customUnit").style.display = (itemVal === "CUSTOM") ? "block" : "none";
        updateUnit();
    }

    function updateUnit() {
        const itemSelect = document.getElementById("itemSelect");
        const selectedOpt = itemSelect.options[itemSelect.selectedIndex];
        const unitDisplay = document.getElementById("unitDisplay");
        if (itemSelect.value === "CUSTOM") {
            unitDisplay.textContent = "手动输入单位";
        } else {
            unitDisplay.textContent = selectedOpt?.getAttribute("data-unit") || "单位";
        }
    }

    // --- 数据操作 ---
    function addData() {
        const date = document.getElementById("dateInput").value;
        const reporter = document.getElementById("reporterInput").value;
        const qty = parseFloat(document.getElementById("qtyInput").value);
        
        let category = document.getElementById("categorySelect").value;
        if(category === "CUSTOM") category = document.getElementById("customCategory").value;

        let item = document.getElementById("itemSelect").value;
        let unit = document.getElementById("unitDisplay").textContent;
        if(item === "CUSTOM") {
            item = document.getElementById("customItem").value;
            unit = document.getElementById("customUnit").value;
        }

        if(!date || !reporter || isNaN(qty) || !category || !item) {
            alert("请完整填写：日期、填表人、分类、工序及数量！"); return;
        }

        localDataList.push({
            date, reporter, category, item, qty, unit,
            station: document.getElementById("startStation").value,
            remarks: document.getElementById("remarksInput").value
        });

        localStorage.setItem('tj03_local_v3', JSON.stringify(localDataList));
        document.getElementById("qtyInput").value = "";
        document.getElementById("remarksInput").value = "";
        renderLocalTable();
    }

    // --- 同步逻辑 (Append Only) ---
    async function uploadToCloud() {
        if(localDataList.length === 0) { alert("无本地草稿。"); return; }
        let token = localStorage.getItem('github_token') || prompt("输入 Token：");
        if(!token) return;

        const btn = document.getElementById('uploadBtn');
        btn.innerText = "⏳ 正在同步数据库...";
        btn.disabled = true;

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            let sha = "";
            let currentCloud = [];
            const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(getRes.ok) {
                const json = await getRes.json();
                sha = json.sha;
                currentCloud = JSON.parse(decodeURIComponent(escape(atob(json.content))));
            }

            const batchId = new Date().toLocaleString();
            const newData = localDataList.map(x => ({...x, batch: batchId}));
            const combined = currentCloud.concat(newData);

            const content = btoa(unescape(encodeURIComponent(JSON.stringify(combined, null, 2))));
            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `Update ${batchId}`, content: content, sha: sha })
            });

            if(putRes.ok) {
                localStorage.setItem('github_token', token);
                localDataList = [];
                localStorage.removeItem('tj03_local_v3');
                cloudDataList = combined;
                renderLocalTable(); renderCloudTable(); renderSummary();
                alert("✅ 云端数据库已增量更新！");
            }
        } catch (e) { alert("同步失败。"); }
        finally { btn.innerText = "⬆️ 合并上传至云端"; btn.disabled = false; }
    }

    async function fetchCloudData(isSilent = false) {
        let token = localStorage.getItem('github_token');
        if(!token && isSilent) return;
        if(!token) token = prompt("输入 Token：");

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(res.ok) {
                const json = await res.json();
                cloudDataList = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                localStorage.setItem('github_token', token);
                document.getElementById('cloudStatus').classList.add('online');
                renderCloudTable(); renderSummary();
            }
        } catch (e) { document.getElementById('cloudStatus').classList.remove('online'); }
    }

    function clearLocalData() {
        if(confirm("确定清空本地草稿？")) {
            localDataList = []; localStorage.removeItem('tj03_local_v3'); renderLocalTable();
        }
    }

    // --- 渲染渲染 ---
    function renderLocalTable() {
        const b = document.getElementById("localBody");
        b.innerHTML = "";
        [...localDataList].reverse().forEach(r => {
            b.innerHTML += `<tr><td>${r.date}</td><td>${r.reporter}</td><td>${r.station}</td><td>${r.item}</td><td class="text-red">+${r.qty}</td><td>${r.unit}</td><td>${r.remarks}</td></tr>`;
        });
    }

    function renderCloudTable() {
        const b = document.getElementById("cloudBody");
        b.innerHTML = "";
        [...cloudDataList].reverse().forEach(r => {
            b.innerHTML += `<tr><td>${r.batch||'-'}</td><td>${r.date}</td><td>${r.reporter}</td><td>${r.station}</td><td>${r.category}</td><td>${r.item}</td><td class="text-blue">${r.qty}</td><td>${r.unit}</td><td>${r.remarks}</td></tr>`;
        });
    }

    function renderSummary() {
        const b = document.getElementById("summaryBody");
        b.innerHTML = "";
        
        // 1. 先渲染字典内的项目
        for(let c in projectDict) {
            projectDict[c].forEach(d => {
                let sum = cloudDataList.filter(x => x.item === d.name).reduce((a, x) => a + x.qty, 0);
                let per = d.total ? (sum/d.total*100).toFixed(1) + "%" : "-";
                let rem = d.total ? (d.total - sum).toFixed(2) : "-";
                b.innerHTML += `<tr><td>${c}</td><td style="text-align:left">${d.name}</td><td>${d.unit}</td><td>${d.total||'-'}</td><td class="text-blue">${sum.toFixed(2)}</td><td class="${d.total && (d.total-sum)<0?'text-red':''}">${rem}</td><td>${per}</td></tr>`;
            });
        }

        // 2. 渲染字典外的自定义项目（汇总）
        const allDictItems = Object.values(projectDict).flat().map(x => x.name);
        const customItems = cloudDataList.filter(x => !allDictItems.includes(x.item));
        
        // 按工序名称聚合
        const aggregated = {};
        customItems.forEach(x => {
            if(!aggregated[x.item]) aggregated[x.item] = { qty: 0, unit: x.unit, cat: x.category };
            aggregated[x.item].qty += x.qty;
        });

        for(let name in aggregated) {
            b.innerHTML += `<tr style="background:#fffbe6;"><td>${aggregated[name].cat}</td><td style="text-align:left">${name} (增)</td><td>${aggregated[name].unit}</td><td style="color:#7f8c8d;">图纸外</td><td class="text-blue">${aggregated[name].qty.toFixed(2)}</td><td>-</td><td>-</td></tr>`;
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'summaryTab') renderSummary();
    }

    function exportExcel(id, name) {
        let wb = XLSX.utils.table_to_book(document.getElementById(id));
        XLSX.writeFile(wb, `${name}_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
</script>
</body>
</html>
