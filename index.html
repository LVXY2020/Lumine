<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国道512线 TJ-03标段 - 无感云同步系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; color: #7f8c8d; }
        .tab-btn.active { color: #2980b9; border-bottom: 3px solid #2980b9; margin-bottom: -2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; background: #e8f4f8; padding: 15px; border-radius: 6px; border: 1px solid #d4e6f1; }
        .form-item { flex: 1; min-width: 150px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-export { background-color: #27ae60; float: right; margin-left: 10px; }
        .btn-danger { background-color: #e74c3c; float: left; }
        .clearfix::after { content: ""; clear: both; display: table; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .text-green { color: #27ae60; font-weight: bold; }
        .table-container { max-height: 600px; overflow-y: auto; }
        #syncStatus { float: right; font-size: 12px; color: #7f8c8d; line-height: 35px; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>国道512线 TJ-03标段 - 施工数据云管理系统</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('entryTab', this)">📝 每日填报流水</button>
        <button class="tab-btn" onclick="switchTab('summaryTab', this)">📊 汇总台账</button>
    </div>

    <div id="entryTab" class="tab-content active">
        <div class="form-group">
            <div class="form-item"><label>施工日期</label><input type="date" id="dateInput"></div>
            <div class="form-item"><label>起讫桩号</label><input type="text" id="startStation" placeholder="KXX+XXX"></div>
            <div class="form-item"><label>工程大类</label><select id="categorySelect" onchange="updateItems()"></select></div>
            <div class="form-item"><label>细分工序</label><select id="itemSelect" onchange="updateUnit()"></select></div>
            <div class="form-item"><label>今日完成量 (<span id="unitDisplay" class="text-red">单位</span>)</label><input type="number" id="qtyInput"></div>
            <div class="form-item" style="justify-content: flex-end;"><button onclick="addData()">+ 录入并自动云同步</button></div>
        </div>

        <div class="clearfix" style="margin-bottom:10px;">
            <button class="btn-danger" onclick="clearData()">⚠️ 清空数据</button>
            <button class="btn-export" onclick="exportExcel('dataTable', '施工流水')">⬇️ 导出流水 Excel</button>
            <span id="syncStatus">☁️ 云端对账中...</span>
        </div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead><tr><th>序号</th><th>日期</th><th>桩号</th><th>大类</th><th>工序</th><th>数量</th><th>单位</th><th>录入时间</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="summaryTab" class="tab-content">
        <div class="table-container">
            <table id="summaryTable">
                <thead><tr><th>大类</th><th>工序</th><th>单位</th><th>图纸总量</th><th>已完成</th><th>剩余</th><th>进度%</th></tr></thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>

    const GITHUB_REPO = "Lumine";    
    const FILE_PATH = "tj03_data.json";

        "7. 涵洞工程": [

            { name: "基底换填未筛分碎石", unit: "m³", total: 51 },
            { name: "未筛分碎石垫层", unit: "m³", total: 17.5 },
            { name: "C30混凝土 (涵身/基础/铺砌)", unit: "m³", total: 107.7 },
            { name: "C40混凝土 (现浇明板)", unit: "m³", total: 10.1 },
            { name: "涵洞受力钢筋 (HRB400等合计)", unit: "kg", total: 4922 },
            { name: "1cm厚橡胶垫", unit: "m²", total: 9.1 },
            { name: "支座锚栓 (Φ25)", unit: "kg", total: null }
        ]
    };

    let dataList = JSON.parse(localStorage.getItem('tj03_data')) || [];
    let recordId = dataList.length > 0 ? Math.max(...dataList.map(d => d.id)) + 1 : 1;

    window.onload = function() {
        document.getElementById('dateInput').valueAsDate = new Date();
        initCategorySelect();
        renderTable();
        renderSummary();
        autoSyncFromCloud(); // 网页一开，自动拉取
    };

    // 🌟 全自动对账：感应云端是否有更新
    async function autoSyncFromCloud() {
        const token = localStorage.getItem('github_token');
        const statusEl = document.getElementById('syncStatus');
        if(!token) {
            statusEl.innerHTML = "☁️ 首次使用请录入一条数据以激活云同步";
            return;
        }

        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(res.ok) {
                const json = await res.json();
                const cloudData = JSON.parse(decodeURIComponent(escape(atob(json.content))));
                if(cloudData.length > dataList.length) {
                    if(confirm(`发现云端有更新（云端${cloudData.length} > 本地${dataList.length}），是否同步？`)) {
                        dataList = cloudData;
                        localStorage.setItem('tj03_data', JSON.stringify(dataList));
                        recordId = Math.max(...dataList.map(d => d.id)) + 1;
                        renderTable(); renderSummary();
                        statusEl.textContent = "✅ 已同步最新状态";
                    }
                } else { statusEl.textContent = "✅ 数据已是最新"; }
            }
        } catch (e) { statusEl.textContent = "❌ 云端连接异常"; }
    }

    // 🌟 全自动备份：录入即上传
    async function autoSaveToCloud() {
        const statusEl = document.getElementById('syncStatus');
        let token = localStorage.getItem('github_token');
        if(!token) {
            token = prompt("☁️ 系统将自动备份至云端，请输入一次 GitHub Token：");
            if(!token) return;
            localStorage.setItem('github_token', token);
        }

        statusEl.textContent = "⏳ 正在自动同步云端...";
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataList, null, 2))));
        
        try {
            let sha = "";
            const getRes = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if(getRes.ok) sha = (await getRes.json()).sha;

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "AutoSync", content: content, sha: sha })
            });

            if(putRes.ok) { statusEl.textContent = "✅ 云端已同步保存"; }
            else { statusEl.textContent = "❌ 云端保存失败（Token权限？）"; }
        } catch (e) { statusEl.textContent = "❌ 网络故障，待下次同步"; }
    }

    function addData() {
        const d = document.getElementById("dateInput").value;
        const s = document.getElementById("startStation").value;
        const c = document.getElementById("categorySelect").value;
        const i = document.getElementById("itemSelect").value;
        const q = parseFloat(document.getElementById("qtyInput").value);
        const u = document.getElementById("unitDisplay").textContent;
        if(!d || isNaN(q)) { alert("请完善填报内容"); return; }

        dataList.push({ id: recordId++, date: d, station: s, category: c, item: i, qty: q, unit: u, timestamp: new Date().toLocaleTimeString() });
        localStorage.setItem('tj03_data', JSON.stringify(dataList));
        document.getElementById("qtyInput").value = "";
        renderTable(); renderSummary();
        
        // 录入后直接触发静默云同步
        autoSaveToCloud(); 
    }

    // --- 以下为渲染及工具代码 ---
    function initCategorySelect() {
        const cat = document.getElementById("categorySelect");
        for(let k in projectDict) { cat.innerHTML += `<option value="${k}">${k}</option>`; }
        updateItems();
    }
    function updateItems() {
        const cat = document.getElementById("categorySelect").value;
        const itemS = document.getElementById("itemSelect");
        itemS.innerHTML = "";
        projectDict[cat].forEach(i => itemS.innerHTML += `<option value="${i.name}" data-unit="${i.unit}">${i.name}</option>`);
        updateUnit();
    }
    function updateUnit() {
        const u = document.getElementById("itemSelect").options[document.getElementById("itemSelect").selectedIndex]?.getAttribute("data-unit");
        document.getElementById("unitDisplay").textContent = u || "单位";
    }
    function renderTable() {
        const b = document.getElementById("tableBody");
        b.innerHTML = "";
        [...dataList].reverse().forEach(r => b.innerHTML += `<tr><td>${r.id}</td><td>${r.date}</td><td>${r.station}</td><td>${r.category}</td><td>${r.item}</td><td class="text-green">${r.qty}</td><td>${r.unit}</td><td>${r.timestamp}</td></tr>`);
    }
    function renderSummary() {
        const b = document.getElementById("summaryBody");
        b.innerHTML = "";
        for(let c in projectDict) {
            projectDict[c].forEach(d => {
                let sum = dataList.filter(x => x.item === d.name).reduce((a, x) => a + x.qty, 0);
                let per = d.total ? (sum/d.total*100).toFixed(1) + "%" : "-";
                let rem = d.total ? (d.total - sum).toFixed(2) : "-";
                b.innerHTML += `<tr><td>${c}</td><td style="text-align:left">${d.name}</td><td>${d.unit}</td><td>${d.total||'-'}</td><td class="text-green">${sum.toFixed(2)}</td><td class="${d.total && (d.total-sum)<0?'text-red':''}">${rem}</td><td>${per}</td></tr>`;
            });
        }
    }
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'summaryTab') renderSummary();
    }
    function exportExcel(id, name) {
        let wb = XLSX.utils.table_to_book(document.getElementById(id));
        XLSX.writeFile(wb, `${name}_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    function clearData() {
        if(prompt("请输入密码 888888 清空本地所有缓存") === "888888") {
            localStorage.removeItem('tj03_data');
            dataList = []; recordId = 1; renderTable(); renderSummary();
        }
    }
</script>
</body>
</html>
